<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CreASHions Studio — manage your shop</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="app.css" />
  <style>
    body{background:var(--bg-alt);}
    .studio{max-width:1080px;margin:0 auto;padding:0 22px 80px;}
    .topbar{position:sticky;top:0;z-index:30;background:rgba(243,233,227,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--sand);}
    .topbar-in{max-width:1080px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:14px;}
    .panel{background:#fff;border:1px solid var(--sand);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-sm);margin-bottom:22px;}
    .panel h2{font-size:24px;margin:0 0 4px;}
    .panel .hint{font-size:14px;color:var(--ink-500);margin:0 0 18px;}
    label.f{display:block;margin-bottom:14px;}
    label.f > span{display:block;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-700);margin-bottom:6px;}
    .in{width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:15px;color:var(--ink-900);padding:11px 13px;border:1.5px solid var(--sand);border-radius:var(--radius-md);background:#fff;outline:none;}
    .in:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,173,187,.18);}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
    .prow{display:flex;align-items:center;gap:14px;padding:10px;border:1px solid var(--sand);border-radius:var(--radius-md);margin-bottom:10px;background:#fff;transition:border .2s;}
    .prow:hover{border-color:var(--taupe);}
    .prow img{width:54px;height:54px;border-radius:10px;object-fit:cover;background:var(--linen);flex:none;}
    .prow .meta{flex:1;min-width:0;}
    .prow .nm{font-weight:700;color:var(--ink-900);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prow .sub{font-size:12px;color:var(--ink-500);}
    .drop{border:1.5px dashed var(--taupe);border-radius:var(--radius-md);padding:14px;text-align:center;color:var(--ink-500);font-size:13px;cursor:pointer;transition:all .2s;}
    .drop.over{border-color:var(--accent);background:var(--teal-100);color:var(--teal-600);}
    .iconbtn{border:1px solid var(--sand);background:#fff;border-radius:10px;width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);}
    .iconbtn:hover{border-color:var(--mulberry);color:var(--mulberry);}
    .tabs{display:flex;gap:8px;margin-bottom:20px;}
    .tab{border:1.5px solid var(--sand);background:#fff;border-radius:var(--radius-pill);padding:9px 18px;font-weight:700;font-size:14px;color:var(--ink-700);cursor:pointer;}
    .tab.on{border-color:var(--mulberry);background:var(--blush-50);color:var(--mulberry);}
    .savebar{position:fixed;right:22px;bottom:22px;display:flex;gap:10px;z-index:40;}
    dialog{border:0;border-radius:var(--radius-xl);padding:0;box-shadow:var(--shadow-lg);max-width:560px;width:92%;}
    dialog::backdrop{background:rgba(58,44,49,.4);}
    .dlg{padding:24px 26px;}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;
const IMGDIR = '../../assets/products/';
const blankProduct = () => ({ id: 'item-' + Math.random().toString(36).slice(2, 7), name: '', cat: 'Tumblers', price: 0, image: '', theme: 'Coastal', size: '', badge: '', blurb: '' });

function Studio() {
  const [store, setStore] = useState(null);
  const [tab, setTab] = useState('products');
  const [editing, setEditing] = useState(null); // product being edited
  const [saved, setSaved] = useState(false);
  const dlg = useRef(null);

  useEffect(() => {
    fetch('content/store.json', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : window.DEFAULT_STORE)
      .catch(() => window.DEFAULT_STORE)
      .then(d => setStore(JSON.parse(JSON.stringify(d))));
  }, []);

  if (!store) return <div style={{ padding: 60, textAlign: 'center', color: 'var(--ink-500)' }}>Loading your shop…</div>;

  const setSite = (k, v) => setStore(s => ({ ...s, site: { ...s.site, [k]: v } }));
  const openEdit = (p) => { setEditing(JSON.parse(JSON.stringify(p))); setTimeout(() => dlg.current && dlg.current.showModal(), 0); };
  const closeEdit = () => { dlg.current && dlg.current.close(); setEditing(null); };
  const saveEdit = () => {
    setStore(s => {
      const products = [...s.products];
      const i = products.findIndex(x => x.id === editing.id);
      if (i >= 0) products[i] = editing; else products.push(editing);
      return { ...s, products };
    });
    closeEdit();
  };
  const removeProduct = (id) => setStore(s => ({ ...s, products: s.products.filter(p => p.id !== id) }));
  const duplicate = (p) => setStore(s => ({ ...s, products: [...s.products, { ...p, id: p.id + '-copy', name: p.name + ' (copy)' }] }));

  function download() {
    const clean = JSON.parse(JSON.stringify(store));
    const blob = new Blob([JSON.stringify(clean, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'store.json';
    a.click();
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  }

  return (
    <div>
      <div className="topbar">
        <div className="topbar-in">
          <img src="../../assets/brand/logo-round.png" style={{ width: 40, height: 40, borderRadius: '50%' }} />
          <div style={{ marginRight: 'auto' }}>
            <div style={{ fontFamily: 'var(--font-wordmark)', fontWeight: 700, fontSize: 20, color: 'var(--ink-900)' }}>CreASHions Studio</div>
            <div style={{ fontSize: 12, color: 'var(--ink-500)' }}>Update your shop — no code needed</div>
          </div>
          <a className="btn btn-secondary" href="index.html" style={{ textDecoration: 'none' }}>View my site</a>
          <button className="btn btn-primary" onClick={download}>{saved ? '✓ Downloaded' : 'Save changes (download)'}</button>
        </div>
      </div>

      <div className="studio">
        <div className="panel" style={{ marginTop: 22, background: 'var(--blush-50)', borderColor: 'var(--blush-200)' }}>
          <h2 style={{ fontSize: 20 }}>How this works <span style={{ fontSize: 18 }}>🦋</span></h2>
          <ol style={{ margin: '8px 0 0', paddingLeft: 20, color: 'var(--ink-700)', fontSize: 14, lineHeight: 1.7 }}>
            <li>Edit your products and text below — it updates the preview as you type.</li>
            <li>For a <strong>new photo</strong>: save the image into the <code>assets/products</code> folder, then type or drag its file name into the product.</li>
            <li>Click <strong>Save changes (download)</strong> — you'll get a <code>store.json</code> file.</li>
            <li>Drop that <code>store.json</code> into the <code>content</code> folder (replace the old one). Done — your site updates!</li>
          </ol>
          <p style={{ fontSize: 13, color: 'var(--ink-500)', margin: '12px 0 0' }}>Full picture-by-picture guide: see <code>content/HOW-TO-EDIT.md</code>.</p>
        </div>

        <div className="tabs">
          <button className={'tab' + (tab === 'products' ? ' on' : '')} onClick={() => setTab('products')}>Products ({store.products.length})</button>
          <button className={'tab' + (tab === 'text' ? ' on' : '')} onClick={() => setTab('text')}>Homepage text</button>
        </div>

        {tab === 'products' && (
          <div className="panel">
            <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
              <div style={{ marginRight: 'auto' }}><h2>Your products</h2><p className="hint" style={{ margin: 0 }}>Click any item to edit. Changes show on your site once you download &amp; replace the file.</p></div>
              <button className="btn btn-accent" onClick={() => openEdit(blankProduct())}>+ Add product</button>
            </div>
            {store.products.map(p => (
              <div className="prow" key={p.id}>
                <img src={IMGDIR + p.image} alt="" onError={e => { e.target.style.opacity = .25; }} />
                <div className="meta" onClick={() => openEdit(p)} style={{ cursor: 'pointer' }}>
                  <div className="nm">{p.name || '(untitled)'}</div>
                  <div className="sub">{p.cat} · ${p.price}{p.size ? ' · ' + p.size : ''}{p.badge ? ' · ' + p.badge : ''}</div>
                </div>
                <button className="iconbtn" title="Edit" onClick={() => openEdit(p)}>✎</button>
                <button className="iconbtn" title="Duplicate" onClick={() => duplicate(p)}>⧉</button>
                <button className="iconbtn" title="Delete" onClick={() => removeProduct(p.id)} style={{ color: 'var(--mulberry)' }}>🗑</button>
              </div>
            ))}
          </div>
        )}

        {tab === 'text' && (
          <div className="panel">
            <h2>Homepage text</h2>
            <p className="hint">The words across the top of your site.</p>
            <label className="f"><span>Headline (line 1)</span><input className="in" value={store.site.heroTitle} onChange={e => setSite('heroTitle', e.target.value)} /></label>
            <label className="f"><span>Headline — script (line 2)</span><input className="in" value={store.site.heroScript} onChange={e => setSite('heroScript', e.target.value)} /></label>
            <label className="f"><span>Intro sentence</span><textarea className="in" rows={2} value={store.site.heroSub} onChange={e => setSite('heroSub', e.target.value)} /></label>
            <label className="f"><span>Top banner (promo)</span><input className="in" value={store.site.promoBar} onChange={e => setSite('promoBar', e.target.value)} /></label>
            <label className="f"><span>Eyebrow (small caps above headline)</span><input className="in" value={store.site.heroEyebrow} onChange={e => setSite('heroEyebrow', e.target.value)} /></label>
            <label className="f"><span>Footer blurb</span><textarea className="in" rows={2} value={store.site.footerBlurb} onChange={e => setSite('footerBlurb', e.target.value)} /></label>
            <div className="grid3">
              {(store.site.stats || []).map((st, i) => (
                <div key={i} style={{ border: '1px solid var(--sand)', borderRadius: 'var(--radius-md)', padding: 12 }}>
                  <input className="in" style={{ marginBottom: 8, fontWeight: 800 }} value={st.big} onChange={e => setStore(s => { const stats = [...s.site.stats]; stats[i] = { ...stats[i], big: e.target.value }; return { ...s, site: { ...s.site, stats } }; })} />
                  <input className="in" value={st.small} onChange={e => setStore(s => { const stats = [...s.site.stats]; stats[i] = { ...stats[i], small: e.target.value }; return { ...s, site: { ...s.site, stats } }; })} />
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <dialog ref={dlg}>
        {editing && <ProductForm p={editing} setP={setEditing} onSave={saveEdit} onCancel={closeEdit} categories={store.categories} collections={store.collections} />}
      </dialog>
    </div>
  );
}

function ProductForm({ p, setP, onSave, onCancel, categories, collections }) {
  const [over, setOver] = useState(false);
  const set = (k, v) => setP(e => ({ ...e, [k]: v }));
  const themes = collections.map(c => c.name.split(' ')[0]);
  function onDrop(ev) {
    ev.preventDefault(); setOver(false);
    const file = ev.dataTransfer.files[0];
    if (file) set('image', file.name);
  }
  return (
    <div className="dlg">
      <h2 style={{ margin: '0 0 16px' }}>{p.name ? 'Edit product' : 'New product'}</h2>
      <div style={{ display: 'flex', gap: 16, marginBottom: 14 }}>
        <img src={IMGDIR + p.image} alt="" onError={e => { e.target.style.opacity = .2; }} style={{ width: 96, height: 96, borderRadius: 'var(--radius-md)', objectFit: 'cover', background: 'var(--linen)', flex: 'none' }} />
        <div style={{ flex: 1 }}
          className={'drop' + (over ? ' over' : '')}
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={onDrop}>
          Drag a photo here to use its file name,<br />or type it below.<br />
          <strong>Remember to also save the photo in <code>assets/products</code>.</strong>
        </div>
      </div>
      <label className="f"><span>Photo file name</span><input className="in" value={p.image} onChange={e => set('image', e.target.value)} placeholder="my-new-tumbler.png" /></label>
      <label className="f"><span>Product name</span><input className="in" value={p.name} onChange={e => set('name', e.target.value)} /></label>
      <div className="grid2">
        <label className="f"><span>Category</span><select className="in" value={p.cat} onChange={e => set('cat', e.target.value)}>{categories.filter(c => c !== 'All').map(c => <option key={c}>{c}</option>)}</select></label>
        <label className="f"><span>Price ($)</span><input className="in" type="number" value={p.price} onChange={e => set('price', Number(e.target.value))} /></label>
      </div>
      <div className="grid2">
        <label className="f"><span>Theme / collection</span><select className="in" value={p.theme} onChange={e => set('theme', e.target.value)}>{themes.map(t => <option key={t}>{t}</option>)}<option>Patriotic</option><option>Galaxy</option></select></label>
        <label className="f"><span>Size (optional)</span><input className="in" value={p.size} onChange={e => set('size', e.target.value)} placeholder="20oz" /></label>
      </div>
      <label className="f"><span>Badge (optional)</span><select className="in" value={p.badge} onChange={e => set('badge', e.target.value)}><option value="">— none —</option><option>Bestseller</option><option>Ready to ship</option></select></label>
      <label className="f"><span>Description</span><textarea className="in" rows={3} value={p.blurb} onChange={e => set('blurb', e.target.value)} /></label>
      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 6 }}>
        <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary" onClick={onSave}>Save product</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Studio />);
  </script>
</body>
</html>
