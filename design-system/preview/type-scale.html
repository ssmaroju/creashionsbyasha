<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 14px;}
  .r{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--sand);padding:7px 0;}
  .r:last-child{border-bottom:0;}
  .t{font-family:var(--font-display);font-weight:600;color:var(--ink-900);line-height:1;flex:1;}
  .n{font-size:11px;color:var(--ink-500);width:108px;text-align:right;font-variant-numeric:tabular-nums;}
  .k{font-size:11px;color:var(--accent-hover);font-weight:700;width:78px;}
</style></head>
<body>
  <p class="lbl">Type scale</p>
  <div class="r"><span class="k">display</span><span class="t" style="font-size:46px">Hand-poured</span><span class="n">clamp → 84px</span></div>
  <div class="r"><span class="k">h1</span><span class="t" style="font-size:34px">Shop the collection</span><span class="n">clamp → 56px</span></div>
  <div class="r"><span class="k">h2</span><span class="t" style="font-size:27px">Ocean wave series</span><span class="n">clamp → 40px</span></div>
  <div class="r"><span class="k">h3</span><span class="t" style="font-size:21px">Sea turtle tumbler</span><span class="n">24px</span></div>
  <div class="r"><span class="k">body</span><span class="t" style="font-family:var(--font-body);font-weight:400;font-size:17px">Made to order, one at a time.</span><span class="n">17px</span></div>
  <div class="r"><span class="k">caption</span><span class="t" style="font-family:var(--font-body);font-weight:400;font-size:13px;color:var(--ink-500)">Free shipping · ships in 5–7 days</span><span class="n">13px</span></div>
</body></html>
