<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pearl);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 6px;}
  .note{font-size:12px;color:var(--ink-700);margin:0 0 16px;max-width:560px;}
  .row{display:flex;gap:30px;align-items:center;justify-content:center;}
  .head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;}
</style></head>
<body>
  <div class="head">
    <div>
      <p class="lbl">Brand elements — watercolor dragonflies</p>
      <p class="note">Asha's signature motif, from the Gemini element sheet. Use as decorative flourishes, dividers, and the page's rare ambient fly-bys. The site also ships a clean line-glyph version for small UI.</p>
    </div>
  </div>
  <div class="row">
    <img src="../assets/brand/dragonfly-pair.png" style="height:120px">
    <img src="../assets/brand/dragonfly-blue.png" style="height:96px">
  </div>
</body></html>
