<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:24px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 16px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .tag{font-size:12px;font-weight:700;padding:6px 13px;border-radius:var(--radius-pill);letter-spacing:.02em;}
  .free{background:var(--sage-200);color:#3c6048;}
  .rts{background:var(--teal-100);color:var(--teal-600);}
  .sale{background:var(--mulberry);color:#fff;}
  .custom{background:var(--gold-200);color:var(--gold-600);}
  .cat{background:#fff;color:var(--ink-700);border:1px solid var(--sand);font-weight:600;}
  .pop{background:var(--blush-100);color:var(--mulberry);}
</style></head>
<body>
  <p class="lbl">Tags &amp; badges</p>
  <div class="row">
    <span class="tag free">Free shipping</span>
    <span class="tag rts">Ready to ship</span>
    <span class="tag sale">−15%</span>
    <span class="tag custom">Made to order</span>
    <span class="tag pop">Bestseller</span>
  </div>
  <div class="row">
    <span class="tag cat">Tumblers</span>
    <span class="tag cat">Earrings</span>
    <span class="tag cat">Coasters</span>
    <span class="tag cat">Resin pens</span>
    <span class="tag cat">Indian decor</span>
  </div>
</body></html>
