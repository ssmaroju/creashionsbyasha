<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pearl);font-family:var(--font-body);padding:18px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 12px;}
  .frame{position:relative;border:1px solid var(--sand);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);background:#f7e8f0;}
  .frame img{display:block;width:100%;}
  .word{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.04em;line-height:1;white-space:nowrap;}
  .w1{font-family:var(--font-display);font-style:italic;font-weight:600;font-size:42px;color:var(--ink-900);text-shadow:0 1px 10px rgba(255,255,255,.55);}
  .w1 b{font-weight:700;color:var(--mulberry);}
  .w2{font-family:var(--font-script);font-size:30px;color:#2e2226;text-shadow:0 1px 8px rgba(255,255,255,.6);}
  .cap{font-size:12px;color:var(--ink-500);margin-top:10px;}
</style></head>
<body>
  <p class="lbl">Site banner — full-width masthead</p>
  <div class="frame">
    <img src="../assets/brand/banner-bg.png" alt="">
    <div class="word"><span class="w1">Cre<b>ASH</b>ions</span><span class="w2">by Asha</span></div>
  </div>
  <p class="cap">Watercolor wash with florals, ferns &amp; dragonflies melting into both ends; the <b>CreASHions by Asha</b> wordmark is live HTML text (Cormorant italic + Pinyon Script, ASH in mulberry) so it stays crisp and correctly cased at any size.</p>
</body></html>
