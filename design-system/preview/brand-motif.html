<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);padding:0;background:var(--pearl);overflow:hidden;}
  .stage{position:relative;height:230px;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(420px 280px at 12% 0%, rgba(241,196,210,.55), transparent 60%),
      radial-gradient(420px 300px at 92% 110%, rgba(166,222,228,.6), transparent 60%),
      radial-gradient(360px 240px at 78% -10%, rgba(217,199,234,.45), transparent 60%),
      var(--pearl);}
  .quote{font-family:var(--font-display);font-style:italic;font-size:26px;color:var(--ink-900);text-align:center;max-width:460px;line-height:1.3;z-index:2;}
  .quote b{color:var(--mulberry);font-style:normal;font-weight:600;}
  .df{position:absolute;opacity:.5;}
  .df svg{display:block;}
  .tag{position:absolute;top:10px;left:16px;font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);z-index:3;}
</style></head>
<body>
  <div class="stage">
    <span class="tag">Watercolor wash + dragonfly motif</span>
    <!-- dragonfly flourishes -->
    <span class="df" style="top:36px;left:60px;transform:rotate(-18deg)">DRAGONFLY</span>
    <div class="quote">“No two pours are ever <b>identical.</b>”</div>
  </div>
  <script>
  // draw a simple line dragonfly motif (brand glyph) into the .df spans
  const svg = `<svg width="58" height="58" viewBox="0 0 48 48" fill="none" stroke="%23C9A66B"></svg>`;
  document.querySelectorAll('.df').forEach((el,i)=>{
    el.innerHTML = dragonfly(i?'#00ADBB':'#C9A66B');
  });
  function dragonfly(c){
    return `<svg width="64" height="64" viewBox="0 0 48 48" fill="none" stroke="${c}" stroke-width="1.6" stroke-linecap="round">
      <line x1="24" y1="10" x2="24" y2="40"/>
      <circle cx="24" cy="11" r="2.4" fill="${c}" stroke="none"/>
      <path d="M24 17 C14 9, 4 12, 9 18 C12 21, 19 20, 24 19"/>
      <path d="M24 17 C34 9, 44 12, 39 18 C36 21, 29 20, 24 19"/>
      <path d="M24 21 C16 16, 8 19, 12 24 C14 26, 20 24, 24 23"/>
      <path d="M24 21 C32 16, 40 19, 36 24 C34 26, 28 24, 24 23"/>
    </svg>`;
  }
  // place a second dragonfly bottom-right
  const d2=document.createElement('span');d2.className='df';d2.style.cssText='bottom:30px;right:70px;transform:rotate(20deg)';d2.innerHTML=dragonfly('#00ADBB');document.querySelector('.stage').appendChild(d2);
  </script>
</body></html>
