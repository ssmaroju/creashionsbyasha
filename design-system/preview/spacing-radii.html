<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 14px;}
  .row{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;}
  .c{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{background:var(--blush-100);border:1px solid var(--rose-300);}
  .nm{font-size:11px;font-weight:800;color:var(--ink-900);}
  .v{font-size:10px;color:var(--ink-500);}
</style></head>
<body>
  <p class="lbl">Corner radii</p>
  <div class="row">
    <div class="c"><div class="box" style="width:70px;height:60px;border-radius:8px"></div><span class="nm">sm</span><span class="v">8px · inputs</span></div>
    <div class="c"><div class="box" style="width:70px;height:60px;border-radius:14px"></div><span class="nm">md</span><span class="v">14px · tags</span></div>
    <div class="c"><div class="box" style="width:70px;height:60px;border-radius:22px"></div><span class="nm">lg</span><span class="v">22px · cards</span></div>
    <div class="c"><div class="box" style="width:70px;height:60px;border-radius:32px"></div><span class="nm">xl</span><span class="v">32px · panels</span></div>
    <div class="c"><div class="box" style="width:70px;height:60px;border-radius:999px"></div><span class="nm">pill</span><span class="v">buttons</span></div>
  </div>
</body></html>
