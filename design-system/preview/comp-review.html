<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 14px;}
  .card{background:#fff;border:1px solid var(--sand);border-radius:var(--radius-lg);padding:20px 22px;box-shadow:var(--shadow-sm);max-width:520px;}
  .stars{color:var(--gold-400);font-size:16px;letter-spacing:2px;}
  .q{font-family:var(--font-display);font-size:21px;font-style:italic;color:var(--ink-900);line-height:1.35;margin:10px 0 14px;}
  .who{display:flex;align-items:center;gap:10px;}
  .av{width:38px;height:38px;border-radius:50%;background:var(--blush-200);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--mulberry);}
  .nm{font-weight:700;color:var(--ink-900);font-size:14px;}
  .dt{font-size:12px;color:var(--ink-500);}
</style></head>
<body>
  <p class="lbl">Customer feedback card</p>
  <div class="card">
    <div class="stars">★★★★★</div>
    <p class="q">“The detail on my sea-turtle tumbler is unreal — it photographs even better in person. Truly one of a kind.”</p>
    <div class="who"><span class="av">M</span><div><div class="nm">Megan R.</div><div class="dt">Verified buyer · Apr 2026</div></div></div>
  </div>
</body></html>
