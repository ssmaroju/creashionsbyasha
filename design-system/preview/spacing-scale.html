<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 16px;}
  .row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;}
  .c{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--teal-200);border-radius:4px;width:30px;}
  .nm{font-size:10px;font-weight:800;color:var(--ink-900);}
  .v{font-size:10px;color:var(--ink-500);}
</style></head>
<body>
  <p class="lbl">Spacing scale — 4px base</p>
  <div class="row">
    <div class="c"><div class="bar" style="height:4px"></div><span class="nm">1</span><span class="v">4</span></div>
    <div class="c"><div class="bar" style="height:8px"></div><span class="nm">2</span><span class="v">8</span></div>
    <div class="c"><div class="bar" style="height:12px"></div><span class="nm">3</span><span class="v">12</span></div>
    <div class="c"><div class="bar" style="height:16px"></div><span class="nm">4</span><span class="v">16</span></div>
    <div class="c"><div class="bar" style="height:24px"></div><span class="nm">5</span><span class="v">24</span></div>
    <div class="c"><div class="bar" style="height:32px"></div><span class="nm">6</span><span class="v">32</span></div>
    <div class="c"><div class="bar" style="height:48px"></div><span class="nm">7</span><span class="v">48</span></div>
    <div class="c"><div class="bar" style="height:64px"></div><span class="nm">8</span><span class="v">64</span></div>
    <div class="c"><div class="bar" style="height:96px"></div><span class="nm">9</span><span class="v">96</span></div>
  </div>
</body></html>
