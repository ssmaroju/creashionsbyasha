<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:24px;display:flex;flex-direction:column;justify-content:center;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 4px;}
  .scr{font-family:var(--font-script);font-size:58px;color:var(--mulberry);line-height:1.1;margin:4px 0;}
  .meta{font-size:14px;color:var(--ink-700);max-width:560px;}
</style></head>
<body>
  <p class="lbl">Script flourish — Pinyon Script</p>
  <div class="scr">with love, Asha</div>
  <p class="meta">Used <strong>only</strong> for occasional flourishes — the maker's signature, a "thank you," a collection accent. Never for body or buttons. <em>(Substitute for the unidentified logo script — pending Asha's font file.)</em></p>
</body></html>
