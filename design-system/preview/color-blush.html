<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:var(--shadow-sm);}
  .nm{font-weight:800;font-size:12px;color:var(--ink-900);}
  .hx{font-size:11px;color:var(--ink-700);font-variant-numeric:tabular-nums;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 14px;}
  .on-dark .nm,.on-dark .hx{color:#fff;}
</style></head>
<body>
  <p class="lbl">Blush rose — the brand's heart</p>
  <div class="row">
    <div class="sw" style="background:var(--blush-50)"><span class="nm">Blush 50</span><span class="hx">#FCF1F4</span></div>
    <div class="sw" style="background:var(--blush-100)"><span class="nm">Blush 100</span><span class="hx">#F8DEE6</span></div>
    <div class="sw" style="background:var(--blush-200)"><span class="nm">Blush 200</span><span class="hx">#F1C4D2</span></div>
    <div class="sw" style="background:var(--rose-300)"><span class="nm">Rose 300</span><span class="hx">#E2A0B5</span></div>
    <div class="sw on-dark" style="background:var(--rose-500)"><span class="nm">Rose 500</span><span class="hx">#B5627E</span></div>
    <div class="sw on-dark" style="background:var(--mulberry)"><span class="nm">Mulberry</span><span class="hx">#8E4A66</span></div>
  </div>
</body></html>
