<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:20px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .ph{aspect-ratio:1;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);background:var(--white);}
  .ph img{width:100%;height:100%;object-fit:cover;}
  .cap{font-size:12px;color:var(--ink-500);margin-top:12px;}
</style></head>
<body>
  <p class="lbl">Imagery — Asha's real handmade pieces on clean grounds</p>
  <div class="grid">
    <div class="ph"><img src="../assets/products/sea-turtle-tumbler.png" alt=""></div>
    <div class="ph"><img src="../assets/products/highland-cow-tumbler.png" alt=""></div>
    <div class="ph"><img src="../assets/products/ocean-wave-earrings.png" alt=""></div>
    <div class="ph"><img src="../assets/products/ocean-coaster.png" alt=""></div>
    <div class="ph"><img src="../assets/products/glitter-pens.png" alt=""></div>
  </div>
  <p class="cap">Round-framed, warm &amp; bright, generous space so the resin gloss and glitter pop — the antidote to flat Etsy thumbnails.</p>
</body></html>
