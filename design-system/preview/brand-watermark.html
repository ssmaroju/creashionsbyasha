<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pearl);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 16px;}
  .row{display:flex;gap:24px;align-items:center;}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .nm{font-size:12px;font-weight:800;color:var(--ink-900);}
  .sub{font-size:11px;color:var(--ink-500);text-align:center;max-width:170px;}
  .shot{position:relative;width:200px;height:200px;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-md);}
  .shot img.p{width:100%;height:100%;object-fit:cover;}
  .shot img.w{position:absolute;bottom:10px;right:10px;width:64px;opacity:.6;mix-blend-mode:multiply;}
</style></head>
<body>
  <p class="lbl">Watermark — protecting Asha's product photos</p>
  <div class="row">
    <div class="item"><img src="../assets/brand/watermark-badge.png" style="width:150px"><span class="nm">Watermark badge</span><span class="sub">The “CBA” monogram + dragonfly</span></div>
    <div class="item">
      <div class="shot"><img class="p" src="../assets/products/sea-turtle-tumbler.png"><img class="w" src="../assets/brand/watermark.png"></div>
      <span class="nm">Applied to a product</span><span class="sub">Subtle, bottom-right, multiply blend ~58%</span>
    </div>
  </div>
</body></html>
