<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:20px;display:flex;gap:18px;}
  .card{width:230px;background:#fff;border:1px solid var(--sand);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:all .3s var(--ease);}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  .ph{position:relative;aspect-ratio:1;overflow:hidden;background:var(--linen);}
  .ph img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease);}
  .card:hover .ph img{transform:scale(1.04);}
  .badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);font-size:11px;font-weight:700;color:var(--teal-600);padding:5px 11px;border-radius:var(--radius-pill);}
  .heart{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;color:var(--rose-400);}
  .bd{padding:14px 15px 16px;}
  .nm{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink-900);line-height:1.2;margin:0 0 4px;}
  .sub{font-size:12px;color:var(--ink-500);margin:0 0 10px;}
  .ft{display:flex;align-items:center;justify-content:space-between;}
  .pr{font-weight:800;color:var(--ink-900);font-size:16px;}
  .st{font-size:12px;color:var(--ink-500);}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);position:absolute;top:6px;left:20px;}
</style></head>
<body>
  <span class="lbl">Product card · rest &amp; hover</span>
  <div class="card" style="margin-top:18px">
    <div class="ph"><img src="../assets/products/sea-turtle-tumbler.png" alt=""><span class="badge">Free shipping</span><span class="heart">♡</span></div>
    <div class="bd"><h3 class="nm">Sea Turtle Tumbler</h3><p class="sub">20oz · ocean wave series</p><div class="ft"><span class="pr">$55</span><span class="st">★ 5.0</span></div></div>
  </div>
  <div class="card" style="margin-top:18px;transform:translateY(-4px);box-shadow:var(--shadow-lg)">
    <div class="ph"><img src="../assets/products/honeybee-tumbler.png" style="transform:scale(1.04)" alt=""><span class="badge">Bestseller</span><span class="heart">♡</span></div>
    <div class="bd"><h3 class="nm">Honey Bee Rustic</h3><p class="sub">floral wood-grain</p><div class="ft"><span class="pr">$58</span><span class="st">★ 5.0</span></div></div>
  </div>
</body></html>
