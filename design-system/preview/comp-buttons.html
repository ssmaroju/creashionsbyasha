<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:26px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 18px;}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:9px;font-family:var(--font-body);font-weight:700;font-size:14.5px;letter-spacing:.015em;border:0;cursor:pointer;border-radius:var(--radius-pill);padding:14px 27px;transition:transform .26s var(--ease),box-shadow .26s var(--ease);isolation:isolate;}
  .btn>*{position:relative;z-index:1;}
  .btn::after{content:"";position:absolute;top:0;left:-130%;width:75%;height:100%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.42),transparent);transform:skewX(-18deg);transition:left .6s var(--ease);z-index:0;}
  .btn:hover::after{left:135%;}
  .btn:active{transform:scale(.97);}
  .primary{background:linear-gradient(180deg,#9a5270,var(--mulberry));color:#fff;box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.18);}
  .primary:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .secondary{background:#fff;color:var(--mulberry);border:1.5px solid var(--rose-300);}
  .secondary:hover{border-color:var(--mulberry);box-shadow:inset 0 -2.5px 0 0 var(--gold-400);transform:translateY(-2px);}
  .accent{background:linear-gradient(180deg,#2fc6d2,var(--teal-400));color:#fff;box-shadow:var(--shadow-glow),inset 0 1px 0 rgba(255,255,255,.22);}
  .accent:hover{transform:translateY(-2px);}
  .ghost{background:transparent;color:var(--mulberry);padding:12px 4px;font-weight:800;letter-spacing:.02em;gap:7px;}
  .ghost::after{content:none;}
  .uline{position:absolute;left:4px;right:30px;bottom:5px;height:1.5px;background:var(--gold-400);transform:scaleX(.35);transform-origin:left;transition:transform .3s var(--ease);}
  .ghost:hover .uline{transform:scaleX(1);}
  .arr{transition:transform .3s var(--ease);display:inline-flex;}
  .ghost:hover .arr{transform:translateX(5px);}
  .hint{font-size:12px;color:var(--ink-700);max-width:340px;}
  svg{display:block;}
</style></head>
<body>
  <p class="lbl">Buttons — “resin-gloss” sheen on hover</p>
  <div class="row">
    <button class="btn primary"><span>Add to cart</span></button>
    <button class="btn secondary"><span>Start a custom piece</span></button>
    <button class="btn accent">
      <span style="display:inline-flex"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20 6 4"/></svg></span>
      <span>See how it’s made</span>
    </button>
    <button class="btn ghost">
      <span>View all pieces</span>
      <span class="arr"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      <span class="uline"></span>
    </button>
  </div>
  <div class="row">
    <button class="btn primary" style="opacity:.42;pointer-events:none"><span>Disabled</span></button>
    <span class="hint">A diagonal gloss sweeps across on hover — a nod to the glassy resin finish. Pill radius, subtle top highlight, −2px lift. The “View all” grows a gold underline and nudges its arrow.</span>
  </div>
</body></html>
