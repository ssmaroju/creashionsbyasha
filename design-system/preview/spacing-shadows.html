<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:26px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 22px;}
  .row{display:flex;gap:26px;flex-wrap:wrap;}
  .c{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:92px;height:64px;background:#fff;border-radius:var(--radius-md);}
  .nm{font-size:11px;font-weight:800;color:var(--ink-900);}
</style></head>
<body>
  <p class="lbl">Elevation — soft, warm-tinted shadows</p>
  <div class="row">
    <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="nm">sm · rest</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="nm">md · hover</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="nm">lg · raised</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-glow)"></div><span class="nm">teal glow · feature</span></div>
  </div>
</body></html>
