<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--pearl);font-family:var(--font-body);padding:22px;}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 16px;}
  .row{display:flex;gap:26px;align-items:center;justify-content:center;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .item img{display:block;}
  .nm{font-size:12px;font-weight:800;color:var(--ink-900);}
  .sub{font-size:11px;color:var(--ink-500);}
  .fav{width:74px;height:74px;border-radius:18px;box-shadow:var(--shadow-md);}
</style></head>
<body>
  <p class="lbl">Brand marks — enhanced logo system</p>
  <div class="row">
    <div class="item"><img src="../assets/brand/logo-main.png" style="width:168px;height:168px;border-radius:50%;box-shadow:var(--shadow-lg)"><span class="nm">Primary logo</span><span class="sub">Hero · packaging · profile</span></div>
    <div class="item"><img src="../assets/brand/stacked-icon.png" style="width:150px"><span class="nm">Stacked icon</span><span class="sub">Compact lockup</span></div>
    <div class="item"><img class="fav" src="../assets/brand/favicon-256.png"><span class="nm">Favicon</span><span class="sub">Browser tab · app icon</span></div>
  </div>
</body></html>
