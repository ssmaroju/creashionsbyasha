<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:22px;}
  .row{display:flex;gap:14px;margin-bottom:8px;}
  .sw{flex:1;border-radius:var(--radius-md);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:var(--shadow-sm);border:1px solid rgba(58,44,49,.06);}
  .nm{font-weight:800;font-size:12px;color:var(--ink-900);}
  .hx{font-size:11px;color:var(--ink-700);}
  .lbl{font-size:var(--fs-eyebrow);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;font-weight:700;color:var(--accent-hover);margin:0 0 12px;}
  .on-dark .nm,.on-dark .hx{color:#fff;}
</style></head>
<body>
  <p class="lbl">Champagne gold (resin shimmer) + warm neutrals</p>
  <div class="row">
    <div class="sw" style="background:var(--gold-200)"><span class="nm">Gold 200</span><span class="hx">#EAD9B8</span></div>
    <div class="sw on-dark" style="background:var(--gold-400)"><span class="nm">Gold 400 ✦</span><span class="hx">#C9A66B</span></div>
    <div class="sw on-dark" style="background:var(--gold-600)"><span class="nm">Gold 600</span><span class="hx">#A8853F</span></div>
    <div class="sw" style="background:var(--pearl)"><span class="nm">Pearl · bg</span><span class="hx">#FBF6F3</span></div>
    <div class="sw" style="background:var(--linen)"><span class="nm">Linen</span><span class="hx">#F3E9E3</span></div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--sand)"><span class="nm">Sand · border</span><span class="hx">#E7D8CF</span></div>
    <div class="sw" style="background:var(--taupe)"><span class="nm">Taupe</span><span class="hx">#C3B0A6</span></div>
    <div class="sw on-dark" style="background:var(--ink-500)"><span class="nm">Ink 500</span><span class="hx">#8A757C</span></div>
    <div class="sw on-dark" style="background:var(--ink-700)"><span class="nm">Ink 700</span><span class="hx">#5A484F</span></div>
    <div class="sw on-dark" style="background:var(--ink-900)"><span class="nm">Ink 900 · text</span><span class="hx">#3A2C31</span></div>
  </div>
</body></html>
